name: Deploy Laravel App

on:
  push:
    branches:
      - main # Change this to your production branch (e.g., master or production)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Build frontend assets so public/build (Vite manifest) is deployed
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend assets
        run: yarn build

      # 3. Remove files that must not be uploaded. storage/ dan bootstrap/cache
      #    WAJIB ikut di-prune: scp-action mengirim arsip tar, dan tar me-reset
      #    permission direktori yang sudah ada di server (775 -> 755), sehingga
      #    www-data kehilangan akses tulis (error tempnam saat login/render).
      - name: Prune excluded files before upload
        run: rm -rf node_modules .git storage bootstrap/cache

      # 4. Deploy files to the server over SSH (SCP)
      - name: Deploy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          source: "."
          target: /var/www/sofikopi_abs/

      # 5. Connect via SSH to run Laravel-specific commands (Optional but Recommended)
      - name: Execute post-deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          script: |
            cd /var/www/sofikopi_abs
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            # RBAC seeder untuk modul Mitra POS: idempotent (updateOrCreate/
            # updateOrInsert), aman dijalankan di setiap deploy. Tidak menimpa
            # perubahan permission yang diubah manual lewat halaman Permission.
            php artisan db:seed --class=MitraPosMenuSeeder --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            # Self-healing permission: pastikan www-data selalu bisa menulis ke
            # storage & bootstrap/cache. Tanpa sudo — sofistore-usr pemilik file
            # dan anggota grup www-data. "|| true" agar file milik www-data yang
            # tidak bisa diubah tidak menggagalkan deploy.
            chgrp -R www-data storage bootstrap/cache || true
            chmod -R ug+rwX storage bootstrap/cache || true
            find storage bootstrap/cache -type d -exec chmod g+s {} + || true
